# Dependabot configuration — M4.3.
# Weekly updates for package ecosystems; DAILY for docker base images (the
# 2026-06 image-CVE incident: openssl fixes published Tuesday 06-09 sat
# unpicked because docker checks ran Mondays — see image-hardening-plan.md).
# Docker entries cover every Dockerfile location.
# Open-PR limits keep review load tractable.

version: 2
updates:
  # .NET backend (NuGet)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # Next.js frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # AIOps webhook (pip)
  - package-ecosystem: "pip"
    directory: "/infrastructure/aiops-webhook"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "aiops"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # Docker base images — one entry per Dockerfile-containing directory
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "backend"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
    ignore:
      # Node majors must be bumped by hand: the alpine builder AND the
      # distroless runtime (whose major lives in the image NAME, which
      # Dependabot never changes) have to move together. An automated major
      # bump of the builder alone recreates the build-on-X/run-on-Y mismatch
      # that PR #73 (node 20-alpine -> 26-alpine) caused.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/infrastructure/aiops-webhook"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "aiops"

  - package-ecosystem: "docker"
    directory: "/infrastructure/uptime-kuma"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "monitoring"
