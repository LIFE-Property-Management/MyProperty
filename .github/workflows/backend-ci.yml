name: Backend CI

on:  
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MyProperty.sln

      - name: Build
        run: dotnet build MyProperty.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test MyProperty.sln --configuration Release --no-build --verbosity normal
