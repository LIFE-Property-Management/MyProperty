name: Backend CI

on:  
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MyProperty.sln

      - name: Format check
        run: dotnet format MyProperty.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build MyProperty.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test MyProperty.sln --configuration Release --no-build --verbosity normal

  migration-bundle:
    name: Build and publish migration bundle
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    concurrency:
      group: migration-bundle-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 10.0.*

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push migration bundle image
        env:
          PUSH: "true"
          IMAGE_REGISTRY: ghcr.io/life-property-management
          GIT_SHA: ${{ env.SHORT_SHA }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: ./backend/scripts/build-migration-bundle.sh

  api-image:
    name: Build and publish API image
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      security-events: write

    concurrency:
      group: api-image-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/life-property-management/myproperty-api:${{ env.SHORT_SHA }}
            ghcr.io/life-property-management/myproperty-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # M4.8 — Trivy CI quality gate.
      # Two-pass: (1) SARIF for the Security tab (severity: CRITICAL,HIGH, non-blocking
      # so HIGH findings remain visible without breaking builds); (2) blocking
      # pass scoped to CRITICAL with `.trivyignore` for triaged exceptions.
      - name: Trivy SARIF report (non-blocking, CRITICAL+HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/life-property-management/myproperty-api:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Trivy quality gate (blocking, CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/life-property-management/myproperty-api:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Generate SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/life-property-management/myproperty-api:${{ env.SHORT_SHA }}
          format: cyclonedx
          output: sbom-api.cdx.json
          exit-code: '0'

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-api-${{ env.SHORT_SHA }}
          path: sbom-api.cdx.json
          retention-days: 90
