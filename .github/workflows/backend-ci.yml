name: Backend CI

on:  
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'MyProperty.sln'
      - '.github/workflows/backend-ci.yml'
  

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MyProperty.sln

      - name: Build
        run: dotnet build MyProperty.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test MyProperty.sln --configuration Release --no-build --verbosity normal

  migration-bundle:
    name: Build and publish migration bundle
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    concurrency:
      group: migration-bundle-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 10.0.*

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push migration bundle image
        env:
          PUSH: "true"
          IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
          GIT_SHA: ${{ env.SHORT_SHA }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: ./backend/scripts/build-migration-bundle.sh
