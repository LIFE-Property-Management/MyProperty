name: n8n Automation CI

on:
  push:
    branches: [develop, main]
    paths:
      - "infrastructure/n8n/**"
      - ".github/workflows/n8n-ci.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "infrastructure/n8n/**"
      - ".github/workflows/n8n-ci.yml"

concurrency:
  group: n8n-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: infrastructure/n8n

jobs:
  workflow-structure:
    name: Workflow structure guard (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infrastructure/n8n/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate the import seed is valid JSON
        run: python -c "import json,io; json.load(io.open('workflows/tenant-inquiry.json', encoding='utf-8'))"

      - name: Run workflow structure tests
        run: pytest -v
