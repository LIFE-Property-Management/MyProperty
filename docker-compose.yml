services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Database kryesore e sistemit.
  # Ruhet ne volume persistent dhe ekspozohet ne portin 5432.
  postgres:
    image: postgres:16-alpine
    container_name: myproperty-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myproperty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - myproperty-net

  # ── Keycloak realm init ────────────────────────────────────────────────────
  # Gjeneron realm-export.json nga template para startimit te Keycloak.
  keycloak-realm-init:
    image: alpine:3.20
    container_name: myproperty-keycloak-realm-init
    command: >
      sh -c "apk add --no-cache gettext > /dev/null &&
      envsubst < /template/realm-export.template.json > /import/realm-export.json"
    environment:
      MYPROPERTY_FRONTEND_BASE_URL: ${MYPROPERTY_FRONTEND_BASE_URL:-http://localhost:3000}
    volumes:
      - ./infrastructure/keycloak:/template:ro
      - keycloak_import:/import
    networks:
      - myproperty-net

  # ── Keycloak ───────────────────────────────────────────────────────────────
  # Authentication + authorization server.
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: myproperty-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      MYPROPERTY_FRONTEND_BASE_URL: ${MYPROPERTY_FRONTEND_BASE_URL:-http://localhost:3000}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - keycloak_import:/opt/keycloak/data/import:ro
    depends_on:
      - postgres
      - keycloak-realm-init
    networks:
      - myproperty-net

  # ── Backend storage init ───────────────────────────────────────────────────
  # Vendos permissions per backend storage volume.
  backend-storage-init:
    image: alpine:3.20
    container_name: myproperty-backend-storage-init
    user: "0:0"
    command: >
      sh -c "mkdir -p /var/myproperty/storage &&
      chown -R 1654:1654 /var/myproperty/storage"
    volumes:
      - backend_storage:/var/myproperty/storage
    networks:
      - myproperty-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Cache dhe SignalR backplane.
  redis:
    image: redis:7-alpine
    container_name: myproperty-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - myproperty-net

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  # Message broker per event-driven communication.
  rabbitmq:
    image: rabbitmq:3-management
    container_name: myproperty-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - myproperty-net

  # ── MailHog ────────────────────────────────────────────────────────────────
  # SMTP catcher per development/testing.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: myproperty-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - myproperty-net

  # ── Backend API ────────────────────────────────────────────────────────────
  # ASP.NET Core backend service.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: myproperty-api:dev
    container_name: myproperty-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"

      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/MyProperty"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/MyProperty/.well-known/openid-configuration"

      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=myproperty;Username=postgres;Password=postgres"

      Cache__RedisConnection: "redis:6379"

      RabbitMq__Enabled: "true"
      RabbitMq__HostName: "rabbitmq"

      Smtp__Host: "mailhog"
      Smtp__Port: "1025"

      FileStorage__LocalRoot: "/var/myproperty/storage"
    ports:
      - "5042:8080"
    volumes:
      - backend_storage:/var/myproperty/storage
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - keycloak
      - backend-storage-init
    networks:
      - myproperty-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Next.js frontend application.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5042}
        NEXT_PUBLIC_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-MyProperty}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-myproperty-frontend}
    image: myproperty-frontend:dev
    container_name: myproperty-frontend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - myproperty-net

  # ── Loki ───────────────────────────────────────────────────────────────────
  # Centralized log aggregation.
  loki:
    image: grafana/loki:3.2.0
    container_name: myproperty-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - myproperty-net

  # ── Promtail ───────────────────────────────────────────────────────────────
  # Dergon Docker logs ne Loki.
  promtail:
    image: grafana/promtail:3.2.0
    container_name: myproperty-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infrastructure/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    networks:
      - myproperty-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Metrics monitoring system.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: myproperty-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager
    networks:
      - myproperty-net

  # ── Alertmanager ───────────────────────────────────────────────────────────
  # Menaxhon alertat e Prometheus.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: myproperty-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - myproperty-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  # Dashboard per logs dhe metrics.
  grafana:
    image: grafana/grafana:11.1.0
    container_name: myproperty-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
      - alertmanager
    networks:
      - myproperty-net

  # ── Uptime Kuma ────────────────────────────────────────────────────────────
  # Uptime monitoring dashboard.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    networks:
      - myproperty-net

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  rabbitmq_data:
  keycloak_import:
  backend_storage:
  prometheus_data:
  promtail_positions:
  uptime_kuma_data:

networks:
  myproperty-net:
    driver: bridge