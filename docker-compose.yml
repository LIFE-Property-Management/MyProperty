services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myproperty-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myproperty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # To force realm re-import after editing realm-export.template.json:
  # docker compose down keycloak keycloak-realm-init
  # docker compose exec postgres psql -U postgres -c "DROP DATABASE IF EXISTS keycloak; CREATE DATABASE keycloak;"
  # docker volume rm myproperty_keycloak_import 2>/dev/null || true
  # docker compose up -d keycloak

  # ── Keycloak realm init (envsubst on the template) ──────────────────────────
  # Renders infrastructure/keycloak/realm-export.template.json into a named
  # volume by substituting our two deployment vars. The keycloak service mounts
  # the same volume at /opt/keycloak/data/import/ and picks up the rendered file
  # on startup. This pattern maps 1:1 to a Kubernetes initContainer; see
  # infrastructure/keycloak/PRODUCTION.md.
  #
  # IMPORTANT — envsubst MUST be scoped to an allow-list, NOT bare `envsubst`.
  # The realm template legitimately contains Keycloak's own ${...} literals
  # (e.g. ${client_id} in the client-roles mapper's claim name, ${role_*},
  # ${rolesScopeConsentText}). Bare envsubst would blank every one of them —
  # clobbering ${client_id} silently breaks the resource_access.<client>.roles
  # claim, so service-account/admin tokens come back with no roles and every
  # Admin API call 403s. The quoted allow-list makes envsubst touch ONLY those
  # two names and pass all other ${...} through verbatim.
  #
  # The `$$` is Compose escaping: Compose interpolates the command string at
  # parse time, so a single `$` here would be expanded (to empty) by Compose
  # before the container ever runs. `$$` → literal `$` reaches the container,
  # where envsubst reads the real values from the `environment:` block below.
  # (The K8s initContainer needs the same allow-list but WITHOUT the `$$` — it
  # isn't under Compose interpolation.)
  keycloak-realm-init:
    image: alpine:3.20
    container_name: myproperty-keycloak-realm-init
    command: >
      sh -c "apk add --no-cache gettext > /dev/null &&
      envsubst '$${MYPROPERTY_FRONTEND_BASE_URL} $${MYPROPERTY_API_CLIENT_SECRET}' < /template/realm-export.template.json > /import/realm-export.json &&
      echo 'Rendered realm-export.json into /import/'"
    environment:
      MYPROPERTY_FRONTEND_BASE_URL: ${MYPROPERTY_FRONTEND_BASE_URL:-http://localhost:3000}
      MYPROPERTY_API_CLIENT_SECRET: ${MYPROPERTY_API_CLIENT_SECRET:-dev-api-client-secret}
    volumes:
      - ./infrastructure/keycloak:/template:ro
      - keycloak_import:/import
    networks:
      - myproperty-net

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: myproperty-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      MYPROPERTY_FRONTEND_BASE_URL: ${MYPROPERTY_FRONTEND_BASE_URL:-http://localhost:3000}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-GOOGLE_CLIENT_ID_PLACEHOLDER}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-GOOGLE_CLIENT_SECRET_PLACEHOLDER}
    ports:
      - "8080:8080"   # Admin console + OIDC  →  http://localhost:8080
    volumes:
      - keycloak_import:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-realm-init:
        condition: service_completed_successfully
    healthcheck:
      # curl is not present in the Keycloak 26 image (stripped from UBI Micro
      # base). We use the bundled JRE to compile and run a one-shot HTTP probe
      # against the realm well-known endpoint. The /tmp file is cached after
      # first compilation. Probes /realms/MyProperty/... so the check only
      # passes after realm import completes.
      test: ["CMD-SHELL", "[ -f /tmp/HealthCheck.java ] || echo 'public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }' > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:8080/realms/MyProperty/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - myproperty-net

  # ── Backend storage init (chowns volume for non-root backend) ───────────────
  # The chiseled backend runtime runs as UID 1654. Docker named volumes are
  # owned by root by default, so the non-root container can't write to
  # /var/myproperty/storage without this init step. This container runs as
  # root, chowns the volume tree to 1654:1654, exits. Same pattern as
  # keycloak-realm-init above; maps 1:1 to a Kubernetes initContainer in M4.4.
  #
  # No-op on second and subsequent runs (chown of already-owned files is
  # cheap). Exits in <1s once the volume is in place.
  backend-storage-init:
    image: alpine:3.20
    container_name: myproperty-backend-storage-init
    user: "0:0"
    command: >
      sh -c "mkdir -p /var/myproperty/storage &&
      chown -R 1654:1654 /var/myproperty/storage &&
      echo 'Backend storage ownership set to 1654:1654'"
    volumes:
      - backend_storage:/var/myproperty/storage
    networks:
      - myproperty-net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myproperty-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: myproperty-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI →  http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Unleash (feature flags, M5.6) ───────────────────────────────────────────
  # Self-hosted Unleash OSS server. Reuses the shared Postgres (dedicated
  # `unleash` database created by infrastructure/postgres/init.sql) and seeds a
  # fixed client API token so the backend SDK connects reproducibly with no
  # manual token creation. The unleash-flag-init sidecar below creates the
  # payments.ocr-autoextract flag via the Admin API on first boot.
  # First run seeds a default admin user (admin / unleash4all) for the UI.
  unleash:
    image: unleashorg/unleash-server:7.6.4
    container_name: myproperty-unleash
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: unleash
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSL: "false"
      # Seeded tokens for reproducible dev/CI only — NEVER use these in a
      # deployed environment. Prod injects a real client token via a Helm
      # Secret (see docs/operations/feature-flags.md).
      INIT_CLIENT_API_TOKENS: "default:development.unleash-insecure-api-token"
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-token"
      LOG_LEVEL: warn
    ports:
      - "4242:4242"   # Unleash UI + API →  http://localhost:4242
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myproperty-net
    healthcheck:
      # The image is Node-based and ships no curl/wget guarantee; use node,
      # which is always on PATH, to probe the built-in /health endpoint.
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:4242/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── Unleash flag seed (one-shot) ────────────────────────────────────────────
  # Creates + enables the payments.ocr-autoextract flag via the Admin API once
  # Unleash is healthy, then exits. Idempotent and failure-tolerant (see
  # seed-flags.sh). Same one-shot pattern as keycloak-realm-init.
  unleash-flag-init:
    image: alpine:3.20
    container_name: myproperty-unleash-flag-init
    command: >
      sh -c "apk add --no-cache curl > /dev/null &&
      sh /seed/seed-flags.sh"
    environment:
      UNLEASH_BASE_URL: "http://unleash:4242"
      UNLEASH_ADMIN_TOKEN: "*:*.unleash-insecure-admin-token"
    volumes:
      - ./infrastructure/unleash/seed-flags.sh:/seed/seed-flags.sh:ro
    depends_on:
      unleash:
        condition: service_healthy
    networks:
      - myproperty-net
    restart: "no"   # One-shot — exits 0 after seeding (or no-op on re-run).

  # ── MailHog (dev SMTP catcher) ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: myproperty-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI →  http://localhost:8025
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MyProperty API (.NET 10) ────────────────────────────────────────────────
  # Production-grade hardening (non-root user, distroless base, healthcheck via
  # the existing /api/v1/health/ready endpoint surfaced through Docker) lands
  # in M4.2. M4.1 only needs the service to start and reach its dependencies.
  #
  # JWKS / issuer split: Authority stays at the browser-facing localhost URL
  # so the iss claim baked into tokens matches; MetadataAddress points at the
  # cluster-internal keycloak hostname so this container can actually fetch
  # the JWKS document. Both halves are required — see Program.cs and
  # infrastructure/keycloak/PRODUCTION.md.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: myproperty-api:dev
    container_name: myproperty-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      LokiUrl: "http://loki:3100"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/MyProperty"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/MyProperty/.well-known/openid-configuration"
      # Admin REST API for user provisioning. BaseUrl MUST be the in-cluster
      # keycloak service, NOT localhost — appsettings.Development.json (baked
      # into the image) defaults BaseUrl to localhost:8080, which in-container
      # loops back to this API itself. Same Secret pattern as Phase 7 Helm.
      KeycloakAdmin__BaseUrl: "http://keycloak:8080"
      KeycloakAdmin__Realm: "MyProperty"
      KeycloakAdmin__ClientId: "myproperty-api"
      KeycloakAdmin__ClientSecret: "${MYPROPERTY_API_CLIENT_SECRET:-dev-api-client-secret}"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=myproperty;Username=postgres;Password=postgres"
      Cache__RedisConnection: "redis:6379"
      Cache__InstancePrefix: "myproperty:dev:"
      SignalR__UseRedisBackplane: "true"
      Cors__AllowedOrigins__0: "${FRONTEND_PUBLIC_URL:-http://localhost:3000}"
      Smtp__Host: "mailhog"
      Smtp__Port: "1025"
      Smtp__UseStartTls: "false"
      Smtp__FromAddress: "no-reply@myproperty.local"
      Smtp__FromName: "MyProperty (dev)"
      Invites__PortalBaseUrl: "${FRONTEND_PUBLIC_URL:-http://localhost:3000}"
      Invites__ExpiryDays: "7"
      RabbitMq__Enabled: "true"
      RabbitMq__HostName: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Exchange: "myproperty.events"
      FileStorage__LocalRoot: "/var/myproperty/storage"
      Anthropic__Model: "claude-sonnet-4-5-20250929"
      Anthropic__TimeoutSeconds: "30"
      Anthropic__ApiKey: "${ANTHROPIC_API_KEY:-}"
      # Feature flags (M5.6). In-container the API reaches Unleash by service DNS
      # (the baked appsettings.Development.json default of localhost is for host
      # `dotnet run`). Token matches the unleash service's INIT_CLIENT_API_TOKENS.
      Unleash__ApiUrl: "http://unleash:4242/api/"
      Unleash__ApiToken: "default:development.unleash-insecure-api-token"
    ports:
      - "5042:8080"   # Host port matches launchSettings.json + NEXT_PUBLIC_API_BASE_URL
    volumes:
      - backend_storage:/var/myproperty/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      backend-storage-init:
        condition: service_completed_successfully
      unleash:
        condition: service_healthy
    networks:
      - myproperty-net
    # Docker HEALTHCHECK omitted: chiseled runtime has no shell or curl
    # to run a probe. Compose treats `running` as sufficient; K8s
    # readiness/liveness probes (M4.4) target /api/v1/health/ready
    # and /api/v1/health/live directly via HTTP from the kubelet.

  # ── MyProperty frontend (Next.js) ───────────────────────────────────────────
  # NEXT_PUBLIC_* vars are inlined into the bundle at build time, not runtime.
  # The Docker build-args here come from .env (or compose defaults) so the
  # bundle the browser downloads has the right URLs baked in.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5042}
        NEXT_PUBLIC_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-MyProperty}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-myproperty-frontend}
        # Local-only mock-auth toggle. Read by proxy.ts (middleware) and the two
        # KeycloakInit components. Never set this in CI or deployed environments.
        NEXT_PUBLIC_DEV_AUTH_BYPASS: "true"
    image: myproperty-frontend:dev
    container_name: myproperty-frontend
    environment:
      NODE_ENV: production
      # Local-only mock-auth toggle, runtime side. Must match the build arg above
      # so the middleware (server) and the inlined bundle (client) agree.
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "true"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - myproperty-net
    # M4.8 — distroless runtime has no shell or wget. The healthcheck.mjs
    # script bundled into the image is invoked via the node binary at the
    # distroless image's standard location. CMD-SHELL would require a
    # shell that distroless doesn't ship. The .mjs extension marks the
    # script as an ES module (frontend/package.json has no "type": "module"
    # so .js would default to CommonJS — .mjs is the unambiguous ESM flag).
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "/app/healthcheck.mjs"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Loki (log aggregation) ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: myproperty-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Promtail (ships container logs to Loki) ─────────────────────────────────
  # Reads docker container stdout/stderr from the host's /var/lib/docker mount
  # and pushes to Loki. The compose project / service labels become Loki
  # labels (see infrastructure/promtail/config.yml). Without this, only the
  # backend pushes structured logs (via Serilog.Sinks.Grafana.Loki); every
  # other container would be a `docker logs` debug session.
  promtail:
    image: grafana/promtail:3.2.0
    container_name: myproperty-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infrastructure/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - myproperty-net

  # ── Prometheus (metrics) ────────────────────────────────────────────────────
  # Scrapes the API's /metrics endpoint (prometheus-net.AspNetCore middleware
  # registered in MyProperty.Api/Program.cs — M4.5). Provisioned as a Grafana
  # datasource alongside Loki. Loads alerting rules from ./alerts/ and forwards
  # firing alerts to the alertmanager service.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: myproperty-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      # Enable lifecycle API so `curl -X POST /-/reload` picks up new alert
      # rules without restarting the container — useful during M4.5 demo
      # when iterating on alerts/*.yml.
      - --web.enable-lifecycle
    ports:
      - "9090:9090"   # Prometheus UI →  http://localhost:9090
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    depends_on:
      alertmanager:
        condition: service_healthy
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Alertmanager (alert routing) ────────────────────────────────────────────
  # Receives firing alerts from Prometheus, deduplicates / groups them, and
  # forwards to the configured receivers. M4.5 wires a single webhook receiver
  # reserved for M4.11 (AIOps auto-triage); the target URL fails until M4.11
  # registers a service at it, which is the documented M4.5 demo state — the
  # alerts themselves are visible in the Prometheus + Alertmanager UIs.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: myproperty-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"   # Alertmanager UI →  http://localhost:9093
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:9093/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── AIOps webhook (M4.11) ───────────────────────────────────────────────────
  # Receives Alertmanager webhook POSTs at /alerts, runs each firing alert
  # through Anthropic Claude for triage, and posts the result to Discord as
  # a rich embed. Resolved alerts skip the LLM (no triage needed) and post a
  # short resolution.
  #
  # Graceful degradation:
  #   - ANTHROPIC_API_KEY empty → triage disabled; raw labels/annotations
  #     are posted with a "Triage disabled" note.
  #   - DISCORD_WEBHOOK_URL empty → message bodies are logged to stdout, which
  #     Promtail forwards to Loki (visible in Grafana → Explore → Loki).
  #
  # The real traffic path stays internal: alertmanager → aiops-webhook:5001
  # over the docker network. Host port 5001 is exposed only so the demo can
  # `curl http://localhost:5001/alerts -d '{...}'` for synthetic testing.
  aiops-webhook:
    build:
      context: ./infrastructure/aiops-webhook
      dockerfile: Dockerfile
    image: myproperty-aiops-webhook:dev
    container_name: myproperty-aiops-webhook
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Haiku for triage (speed + cost); backend OCR uses Sonnet for vision.
      ANTHROPIC_MODEL: "${AIOPS_ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      AIOPS_LOG_LEVEL: "${AIOPS_LOG_LEVEL:-INFO}"
      AIOPS_CLAUDE_TIMEOUT_SECONDS: "${AIOPS_CLAUDE_TIMEOUT_SECONDS:-15}"
      AIOPS_DISCORD_TIMEOUT_SECONDS: "${AIOPS_DISCORD_TIMEOUT_SECONDS:-10}"
    ports:
      - "5001:5001"
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Grafana (dashboards) ─────────────────────────────────────────────────────
  # NOTE: anonymous admin is enabled — local demo only, not suitable for production.
  grafana:
    image: grafana/grafana:11.1.0
    container_name: myproperty-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3001:3000"   # Next.js owns 3000; Grafana exposed on 3001
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    networks:
      - myproperty-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Uptime Kuma (M4.6) ──────────────────────────────────────────────────────
  # Self-hosted uptime monitor + public status page. Probes every other service
  # in the stack on a recurring schedule, persists results to a SQLite DB on a
  # named volume, and exposes a Vue.js UI + status page at
  # http://localhost:3002 (host port).
  #
  # The seed sidecar (`uptime-kuma-init` below) provisions a fixed set of
  # monitors + a public status page + Slack/email notification channels on
  # first start via the Kuma socket.io API. Subsequent boots find the admin
  # account already configured and exit no-op.
  #
  # Notifications:
  #   - Discord: only created if DISCORD_WEBHOOK_URL is set (Kuma renders
  #     Discord-native embeds). In K8s this is a separate channel from the
  #     aiops-webhook's #alerts; locally it's whatever you point it at.
  #   - Email: posts to the MailHog SMTP catcher already in this stack —
  #     visible at http://localhost:8025. Demo-friendly without an external
  #     SMTP account.
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16-alpine
    container_name: myproperty-uptime-kuma
    ports:
      - "3002:3001"   # Host 3002 → container 3001 (Kuma's default; 3001 already used by Grafana)
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - myproperty-net
    # The official image ships an `extra/healthcheck` Node probe that hits the
    # internal port. Restated here explicitly so the start_period accounts for
    # the SQLite migrations Kuma runs on a fresh volume (~30 s cold).
    healthcheck:
      test: [ "CMD", "node", "extra/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── Uptime Kuma seed (one-shot) ─────────────────────────────────────────────
  # First-run bootstrap: creates the admin user, the notification channels,
  # the monitors, and the public status page via Kuma's socket.io API.
  # Subsequent runs detect the existing admin and short-circuit to a no-op,
  # so `docker compose up` is safe to re-run without resetting any state.
  #
  # Same one-shot pattern as `keycloak-realm-init` and `backend-storage-init`:
  # runs to completion, exits 0, never restarts. Maps 1:1 to a Kubernetes Job
  # in the Helm chart (see helm/myproperty/templates/monitoring/uptime-kuma-*).
  uptime-kuma-init:
    build:
      context: ./infrastructure/uptime-kuma
      dockerfile: Dockerfile
    image: myproperty-uptime-kuma-init:dev
    container_name: myproperty-uptime-kuma-init
    environment:
      KUMA_BASE_URL: "http://uptime-kuma:3001"
      KUMA_ADMIN_USERNAME: "${KUMA_ADMIN_USERNAME:-admin}"
      KUMA_ADMIN_PASSWORD: "${KUMA_ADMIN_PASSWORD:-changeme-please-1234}"
      # Public URL the status page will advertise in its "Powered by" link.
      # The compose default points at the localhost host-port binding;
      # .env.proxy.example overrides to https://status.${MYPROPERTY_DOMAIN}.
      KUMA_PUBLIC_URL: "${KUMA_PUBLIC_URL:-http://localhost:3002}"
      # Notification channels — both optional. Empty values short-circuit
      # the corresponding channel; the demo runs without external accounts.
      DISCORD_WEBHOOK_URL: "${DISCORD_UPTIME_WEBHOOK_URL:-}"
      # MailHog runs in this stack on port 1025 — the email notification
      # lands in the MailHog Web UI at http://localhost:8025, demoable
      # without configuring an external SMTP provider.
      KUMA_SMTP_HOST: "${KUMA_SMTP_HOST:-mailhog}"
      KUMA_SMTP_PORT: "${KUMA_SMTP_PORT:-1025}"
      KUMA_SMTP_FROM: "${KUMA_SMTP_FROM:-uptime@myproperty.local}"
      KUMA_SMTP_TO: "${KUMA_SMTP_TO:-oncall@myproperty.local}"
      KUMA_LOG_LEVEL: "${KUMA_LOG_LEVEL:-INFO}"
    depends_on:
      uptime-kuma:
        condition: service_healthy
    networks:
      - myproperty-net
    restart: "no"   # One-shot — exits 0 after seeding (or no-op on re-run).

  # ── n8n automation (M5.8 / FS-8) ────────────────────────────────────────────
  # Low-code automation pipeline: an HTTP Webhook trigger receives a tenant
  # inquiry, Anthropic Claude triages it (category + urgency + sentiment + a
  # drafted reply), and the result is posted to Discord — i.e. the required
  # webhook → LLM → notification flow, built visually rather than in code.
  #
  # Distinct from the M4.11 aiops-webhook, which triages *ops* alerts in Python:
  # n8n owns a *product* event (a tenant reaching out). The workflow definition
  # lives in infrastructure/n8n/workflows/tenant-inquiry.json and is imported +
  # activated on first boot by the n8n-init sidecar below.
  #
  # Graceful degradation (so `docker compose up` works on a fresh clone with no
  # external accounts):
  #   - ANTHROPIC_API_KEY empty → the workflow's "Anthropic configured?" branch
  #     skips the LLM and returns a manual-review fallback.
  #   - DISCORD_WEBHOOK_URL empty → the "Discord configured?" branch skips the
  #     POST; every run still logs a structured line to stdout (CODE_ENABLE_STDOUT)
  #     which Promtail ships to Loki — visible in Grafana → Explore → Loki.
  #
  # Demo:  curl -X POST http://localhost:5678/webhook/tenant-inquiry \
  #          -H 'Content-Type: application/json' \
  #          -d @infrastructure/n8n/samples/tenant-inquiry.json
  # Editor UI (dev, no login): http://localhost:5678
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: myproperty-n8n
    environment:
      # Stable key so the SQLite store on the named volume stays readable across
      # restarts (and matches the n8n-init sidecar). Dev default only — inject a
      # real 32+ char secret in any deployed environment.
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-myproperty-n8n-dev-encryption-key-change-me}"
      # Base URL n8n uses to compute the public webhook URL it advertises.
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:-http://localhost:5678/}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-UTC}"
      # Allow $env.* lookups inside Code / HTTP nodes — the workflow reads
      # ANTHROPIC_API_KEY and DISCORD_WEBHOOK_URL this way, so there is no
      # encrypted n8n credential to manage and the import seed stays plain JSON.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Surface Code-node console.log() to process stdout → Promtail → Loki.
      CODE_ENABLE_STDOUT: "true"
      # Dev-only: skip the owner-setup wizard so the editor opens without a login.
      # Never set this in a deployed environment.
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      # Secrets the workflow consumes. Both optional — empty values trigger the
      # graceful-degradation branches above. ANTHROPIC_API_KEY is the same key
      # the backend OCR + aiops-webhook use; DISCORD_WEBHOOK_URL is shared with
      # the aiops-webhook (post to a separate channel in prod if you prefer).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      # Claude model used for inquiry triage. Haiku by default (fast + cheap).
      N8N_TENANT_INQUIRY_MODEL: "${N8N_TENANT_INQUIRY_MODEL:-claude-haiku-4-5-20251001}"
    ports:
      - "5678:5678"   # n8n editor + webhook →  http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-init:
        condition: service_completed_successfully
    networks:
      - myproperty-net
    healthcheck:
      # Node is always on PATH; the alpine base ships no curl. /healthz is n8n's
      # own liveness endpoint.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── n8n workflow seed (one-shot) ────────────────────────────────────────────
  # Imports + activates the tenant-inquiry workflow into the shared n8n_data
  # volume, then exits. Runs BEFORE the main n8n service (which gates on
  # service_completed_successfully) so there is never concurrent SQLite access.
  # Idempotent: import upserts by workflow id (no duplicates on re-up); import
  # also deactivates, which is why `update:workflow --active true` follows. Same
  # one-shot pattern as keycloak-realm-init / unleash-flag-init / uptime-kuma-init.
  #
  # Activation is scoped to --id (not --all): import upserts by workflow id, so
  # the activate step targets the same id rather than re-activating every
  # workflow in the store. Without --id, a workflow hand-created (and
  # deliberately deactivated) in the UI would be silently force-reactivated on
  # the next `docker compose up`. Keeping both steps id-scoped also matches the
  # idempotent-by-id story the import already tells.
  n8n-init:
    image: n8nio/n8n:1.76.1
    container_name: myproperty-n8n-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        n8n import:workflow --input=/import/tenant-inquiry.json
        || echo 'n8n-init: import failed (continuing)';
        n8n update:workflow --id=MyPropertyM58Inq --active true
        || echo 'n8n-init: activate failed (continuing)'
    environment:
      # MUST match the main n8n service so the SQLite store it writes is readable.
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-myproperty-n8n-dev-encryption-key-change-me}"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infrastructure/n8n/workflows/tenant-inquiry.json:/import/tenant-inquiry.json:ro
    networks:
      - myproperty-net
    restart: "no"   # One-shot — exits 0 after import+activate (or no-op on re-run).

  # ── Nginx reverse proxy (M4.9) ──────────────────────────────────────────────
  # Opt-in via `docker compose --profile proxy up`. Without the profile, the
  # default stack still binds 3000/5042/8080/etc. to the host as before —
  # existing curl/browser instructions throughout the docs keep working.
  #
  # With the profile, nginx adds host ports 80 + 443 and routes by subdomain:
  #   app.${MYPROPERTY_DOMAIN}  → frontend:3000
  #   api.${MYPROPERTY_DOMAIN}  → backend:8080
  #   auth.${MYPROPERTY_DOMAIN} → keycloak:8080
  #
  # TLS material lives in the certbot_certs named volume. Local dev populates
  # it via `infrastructure/nginx/init-selfsigned.sh`; production via
  # `infrastructure/nginx/init-letsencrypt.sh` (Let's Encrypt webroot challenge).
  # Either way nginx reads from the same path
  # (/etc/letsencrypt/live/app.${MYPROPERTY_DOMAIN}/{fullchain,privkey}.pem),
  # so the vhost template is identical in dev + prod.
  #
  # The CMD wrapper runs `nginx -s reload` every 6h in a background loop so
  # renewed certs from the certbot service get picked up without a manual
  # restart. See docs/operations/nginx-ssl.md for the renewal architecture.
  nginx:
    image: nginx:1.27-alpine
    container_name: myproperty-nginx
    command: ["/bin/sh", "-c", "while :; do sleep 6h & wait $${!}; nginx -s reload; done & exec /docker-entrypoint.sh nginx -g 'daemon off;'"]
    environment:
      # NGINX_ENVSUBST_FILTER scopes envsubst to MYPROPERTY_* so nginx's own
      # variables ($host, $remote_addr, …) in the template pass through
      # untouched. Without the filter, every $var in the template gets
      # replaced and the config breaks at load time.
      NGINX_ENVSUBST_FILTER: "^MYPROPERTY_"
      MYPROPERTY_DOMAIN: "${MYPROPERTY_DOMAIN:-myproperty.localhost}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/templates:/etc/nginx/templates:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
      # uptime-kuma is loose-coupled: the status vhost still renders 502 if
      # Kuma is down, but the rest of the proxy keeps serving. service_started
      # is enough — the upstream block resolves at request time, not at boot.
      uptime-kuma:
        condition: service_started
    networks:
      - myproperty-net
    healthcheck:
      # /healthz is served by the default :80 server block (off the
      # access log, no upstream dep). Verifies only that nginx itself
      # is responsive — backend/frontend reachability is gated by
      # their own healthchecks.
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - proxy

  # ── Certbot (Let's Encrypt) ─────────────────────────────────────────────────
  # Long-running service that runs `certbot renew` every 12h. Renewal is a
  # no-op until certs are within 30 days of expiry; the loop exists so the
  # action happens automatically when the time comes.
  #
  # First-time issuance is NOT handled here — run
  # `./infrastructure/nginx/init-letsencrypt.sh` once after DNS is in place
  # (or `init-selfsigned.sh` for local dev). The init script seeds a temp
  # cert, starts nginx, runs `certbot certonly --webroot`, then reloads nginx.
  #
  # The 12h sleep + nginx's 6h reload loop bound the maximum staleness of
  # served certs to ~18h after a renewal — comfortably inside the 30-day
  # buffer Let's Encrypt provides before expiry.
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: myproperty-certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - myproperty-net
    profiles:
      - proxy

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  rabbitmq_data:
  keycloak_import:
  backend_storage:
  prometheus_data:
  promtail_positions:
  alertmanager_data:
  certbot_certs:
  certbot_www:
  uptime_kuma_data:
  n8n_data:

networks:
  myproperty-net:
    driver: bridge
