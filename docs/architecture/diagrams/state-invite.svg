<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="629px" preserveAspectRatio="none" style="width:852px;height:629px;background:#FAFAFA;" version="1.1" viewBox="0 0 852 629" width="852px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><rect fill="#FAFAFA" height="629" style="stroke:none;stroke-width:1;" width="852" x="0" y="0"/><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="303.8711" x="270.7979" y="24.5332">Invite lifecycle &#8212; state machine (InviteStatus)</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="10" id="ent0001"><ellipse cx="340.88" cy="54.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="Pending" data-source-line="10" id="ent0002"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="71.3789" x="305.38" y="204.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="305.38" x2="376.7589" y1="232.2188" y2="232.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3789" x="315.38" y="224.1426">Pending</text></g><g class="entity" data-qualified-name="Accepted" data-source-line="12" id="ent0004"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="78.3721" x="72.88" y="394.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="72.88" x2="151.2521" y1="422.2188" y2="422.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="58.3721" x="82.88" y="414.1426">Accepted</text></g><g class="entity" data-qualified-name="Rejected" data-source-line="13" id="ent0006"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="75.2549" x="231.38" y="394.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="231.38" x2="306.6349" y1="422.2188" y2="422.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.2549" x="241.38" y="414.1426">Rejected</text></g><g class="entity" data-qualified-name="Expired" data-source-line="14" id="ent0008"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="67.4688" x="462.38" y="394.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="462.38" x2="529.8488" y1="422.2188" y2="422.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="47.4688" x="472.38" y="414.1426">Expired</text></g><g class="end_entity" data-qualified-name=".end." data-source-line="16" id="ent0010"><ellipse cx="217.88" cy="585.1094" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="217.88" cy="585.1094" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN14" data-source-line="21" id="ent0015"><path d="M411.88,175.6094 L411.88,225.6094 L376.66,229.6094 L411.88,233.6094 L411.88,283.7188 A0,0 0 0 0 411.88,283.7188 L837.4669,283.7188 A0,0 0 0 0 837.4669,283.7188 L837.4669,185.6094 L827.4669,175.6094 L411.88,175.6094 A0,0 0 0 0 411.88,175.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M827.4669,175.6094 L827.4669,185.6094 L837.4669,185.6094 L827.4669,175.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.4961" x="417.88" y="194.1045">Accept and Reject both require</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="218.8672" x="599.9879" y="194.1045">Status == Pending AND not expired</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="818.8551" y="194.1045">,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="55.6372" x="417.88" y="210.4561">otherwise</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="21.6899" x="477.129" y="210.4561">404</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.7769" x="502.4308" y="210.4561">(NotFoundException &#8212; there is deliberately no 410).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.7896" x="417.88" y="226.8076">The invite token is a 32-byte secret in the email link; the DB stores</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="40.46" x="417.88" y="243.1592">only its</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="87.4199" x="461.9518" y="243.1592">SHA-256 hash</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.8125" x="549.3717" y="243.1592">. Accept additionally requires:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="56.3354" x="421.4918" y="259.5107">- the JWT</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="91.0254" x="481.4391" y="259.5107">email to match</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="128.9971" x="576.0763" y="259.5107">the invite email &#8594; else</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="21.6899" x="708.6852" y="259.5107">403</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.3291" x="421.4918" y="275.8623">-</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="122.0718" x="429.4327" y="275.8623">no existing account</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.4316" x="555.1163" y="275.8623">for that email &#8594; else</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="21.6899" x="676.1598" y="275.8623">409</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.4976" x="701.4615" y="275.8623">("log in instead")</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="30" id="ent0018"><path d="M316.88,555.6094 L316.88,614.6641 L767.1085,614.6641 L767.1085,565.6094 L757.1085,555.6094 L316.88,555.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M757.1085,555.6094 L757.1085,565.6094 L767.1085,565.6094 L757.1085,555.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="381.2021" x="322.88" y="574.1045">Expired rows are kept ~30 days for audit, then hard-deleted by the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="121.418" x="322.88" y="590.4561">orphan-cleanup scan</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="26.7236" x="447.9098" y="590.4561">only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.9434" x="478.2452" y="590.4561">if no Lease was ever created from them.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="429.2285" x="322.88" y="606.8076">An accepted invite is retained as an immutable record of what was offered.</text></g><!--link *start* to Pending--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="10" id="lnk3"><path d="M340.88,64.9094 C340.88,91.0194 340.88,160.5994 340.88,199.4394" fill="none" id="*start*-to-Pending" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="340.88,204.4394,344.88,195.4394,340.88,199.4394,336.88,195.4394,340.88,204.4394" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.6162" x="391.3663" y="109.1045">CreateInviteHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.5425" x="363.9032" y="125.4561">(landlord &#8212; RequireLandlord;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.5889" x="341.88" y="141.8076">7-day expiry, email sent via Hangfire)</text></g><!--link Pending to Accepted--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="12" id="lnk5"><path d="M305.15,234.4194 C229.03,243.3494 54.9,268.3794 19.88,313.6094 C6,331.5294 8.62,344.9394 19.88,364.6094 C31.29,384.5394 48.6351,395.8578 68.2351,404.2678" fill="none" id="Pending-to-Accepted" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="72.83,406.2394,66.1365,399.0146,68.2351,404.2678,62.982,406.3664,72.83,406.2394" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.3398" x="98.7372" y="328.1045">AcceptInviteHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.5806" x="52.1168" y="344.4561">(authenticated tenant; provisions the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.0542" x="20.88" y="360.8076">Keycloak user + creates the Lease &#8212; single tx)</text></g><!--link Pending to Rejected--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="13" id="lnk7"><path d="M335.83,255.0094 C329.7,282.3994 318.13,327.8194 301.88,364.6094 C297.4,374.7594 293.9947,381.0849 288.2647,390.1349" fill="none" id="Pending-to-Rejected" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="285.59,394.3594,293.784,388.8951,288.2647,390.1349,287.0249,384.6156,285.59,394.3594" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.4453" x="321.88" y="336.6045">RejectInviteHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.8672" x="340.6691" y="352.9561">(anonymous)</text></g><!--link Pending to Expired--><g class="link" data-entity-1="ent0002" data-entity-2="ent0008" data-link-type="dependency" data-source-line="14" id="lnk9"><path d="M362.69,254.8594 C371.85,264.3794 382.91,275.0394 393.88,283.6094 C414.31,299.5594 426.31,294.5594 443.88,313.6094 C465.54,337.0794 478.5258,366.5445 486.6158,389.4645" fill="none" id="Pending-to-Expired" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="488.28,394.1794,489.0564,384.3612,486.6158,389.4645,481.5125,387.0239,488.28,394.1794" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.498" x="513.1031" y="336.6045">MarkExpiredInvitesJob</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.9443" x="477.88" y="352.9561">(Hangfire, hourly; ExpiresAt &lt; now)</text></g><!--link Accepted to *end*--><g class="link" data-entity-1="ent0004" data-entity-2="ent0010" data-link-type="dependency" data-source-line="16" id="lnk11"><path d="M117.5,444.6994 C123.51,467.0594 134.58,500.5794 151.88,525.6094 C167.9,548.7894 190.8499,566.0659 204.8199,575.5259" fill="none" id="Accepted-to-*end*" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="208.96,578.3294,203.7507,569.971,204.8199,575.5259,199.265,576.5951,208.96,578.3294" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46.2363" x="152.88" y="505.6045">terminal</text></g><!--link Rejected to *end*--><g class="link" data-entity-1="ent0006" data-entity-2="ent0010" data-link-type="dependency" data-source-line="17" id="lnk12"><path d="M236.54,444.8294 C227.84,453.1994 219.55,463.3394 214.88,474.6094 C200.69,508.8694 208.5962,549.6317 213.7662,569.4217" fill="none" id="Rejected-to-*end*" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="215.03,574.2594,216.6253,564.5406,213.7662,569.4217,208.885,566.5627,215.03,574.2594" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46.2363" x="215.88" y="505.6045">terminal</text></g><!--link Expired to *end*--><g class="link" data-entity-1="ent0008" data-entity-2="ent0010" data-link-type="dependency" data-source-line="18" id="lnk13"><path d="M462.35,422.4494 C420.36,426.2894 347.99,438.1294 298.88,474.6094 C277.4,490.5694 282.62,503.9694 266.88,525.6094 C253.01,544.6794 238.0873,561.7951 228.2373,572.7251" fill="none" id="Expired-to-*end*" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="224.89,576.4394,233.8865,572.4315,228.2373,572.7251,227.9437,567.0759,224.89,576.4394" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.7471" x="349.3758" y="489.1045">OrphanCleanupJob</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5107" x="326.994" y="505.4561">(Hangfire, daily 03:00 UTC;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.7388" x="299.88" y="521.8076">hard-delete after 30 days if no lease)</text></g><!--link Expired to GMN17--><g class="link" data-entity-1="ent0008" data-entity-2="ent0018" data-link-type="association" data-source-line="30" id="lnk19"><path d="M507.92,444.6294 C512.16,453.8294 516.68,464.5394 519.88,474.6094 C528.41,501.3994 534.34,532.9694 537.87,555.3094" fill="none" id="Expired-GMN17" style="stroke:#555555;stroke-width:1;stroke-dasharray:7,7;"/></g><?plantuml-src RLJBKjH05DtFLzpI3KI66WHyW5Wre1IYegLOBiH5J_fcqaxIFNPt65AMbYi_mF8B-HBFJMSGbPbDSli-pZdtTAA95TCpUsuYKsKApjiSWSllloX4XLYjyj9OffMKynR19gmE1c5cx5nvLTE-ocTJxngh3rpbFDq-7Cl_MaRgz6L0D-HsFpbnNhFleniRznvCDA9ZxzsY3svlRm--3WOVieyq73wcrsoriLFQeGFFw9_m7IchA_PdTgMI9pJjkBpXputn_AAFxPxP-qEjMkABkV7j6d6jJ4M1RQHpemXTfWNomNCvHaQEyvpdaJLcfiT_PwecbkXXSYLPaQsoSPVctfsRO9mDXECp-voXiLCpQW9xkaDvXxyxf1UiGYy_fc8JyMBrBmnl-1Fd2KDw_0-3TRQjdIpfUjrJOTgLlLH-rh-bsd3i9YXSabwZqZM-QdVxcZ2Ez8YiMq2DAmMafMnY1onzRQog1bV8RZXRJhzszihFIsKFAbQscV-BG6CTBOqsTqOZUdTwW7sLokkXvehX95MWCMsEaDO6CWN0KIN20Q5rIF1cMaPonT8augGEEK6cNZUQk5YIJyQWB4lEfhszAsUDJvwWSqmcOPrbQ-Y38lOB4wHaQxILPRHoukAXMFhfXOp0dhlzIHwJ2GJGPi8UAmOb8DtQ6AskezCfrctInOjknbPo5MtU7KvQX0B35X49dIsIFojZPxlT-vDzN2g7tGWYYxuc1k5mD1xUtRv7fGfbbgrVaTRQ22vL8RDd77PGIiEks_7xKnId6T7XoiSSvTrH3p2TNVxuILprr3UpB7N8Cf3Y2nEYYARo75f4b1UujB5KyQRYXwBRhSfDXQ2n8RBIjrO745uKvtwDs51qjUonzmy6Bfs4xmBaWi8pOVXjQGOPgXhGNHFubgxPHjEabQ18rdblc2VpKSYL1ImH4hYIdz95NAX0V0wpfJkggV00X2QrR71iXMww4BrGs27Mfl35r8HQz3LrtKGrmLNsdClt27GM8elqTaK1b-ZrFyn_0m00?></g></svg>