<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="807px" preserveAspectRatio="none" style="width:874px;height:807px;background:#FAFAFA;" version="1.1" viewBox="0 0 874 807" width="874px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><rect fill="#FAFAFA" height="807" style="stroke:none;stroke-width:1;" width="874" x="0" y="0"/><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="457.1738" x="205.2551" y="24.5332">Payment lifecycle &#8212; server-enforced state machine (PaymentStatus)</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="10" id="ent0001"><ellipse cx="352" cy="54.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="Outstanding" data-source-line="10" id="ent0002"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="95.4961" x="304.5" y="175.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="304.5" x2="399.9961" y1="203.2188" y2="203.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="314.5" y="195.1426">Outstanding</text></g><g class="entity" data-qualified-name="Pending" data-source-line="12" id="ent0004"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="71.3789" x="316.5" y="382.1094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="316.5" x2="387.8789" y1="409.7188" y2="409.7188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3789" x="326.5" y="401.6426">Pending</text></g><g class="entity" data-qualified-name="Rejected" data-source-line="13" id="ent0006"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="75.2549" x="194.5" y="588.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="194.5" x2="269.7549" y1="616.2188" y2="616.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.2549" x="204.5" y="608.1426">Rejected</text></g><g class="entity" data-qualified-name="Confirmed" data-source-line="15" id="ent0008"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#1168BD;stroke-width:0.5;" width="84.5791" x="571.5" y="588.6094"/><line style="stroke:#1168BD;stroke-width:0.5;" x1="571.5" x2="656.0791" y1="616.2188" y2="616.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.5791" x="581.5" y="608.1426">Confirmed</text></g><g class="end_entity" data-qualified-name=".end." data-source-line="18" id="ent0011"><ellipse cx="614" cy="754.1094" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="614" cy="754.1094" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN13" data-source-line="21" id="ent0014"><path d="M422.5,336.6094 L422.5,403.1094 L387.56,407.1094 L422.5,411.1094 L422.5,477.4219 A0,0 0 0 0 422.5,477.4219 L859.6841,477.4219 A0,0 0 0 0 859.6841,477.4219 L859.6841,346.6094 L849.6841,336.6094 L422.5,336.6094 A0,0 0 0 0 422.5,336.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M849.6841,336.6094 L849.6841,346.6094 L859.6841,346.6094 L849.6841,336.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.998" x="428.5" y="355.1045">The Payment entity is</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="44.8018" x="557.1099" y="355.1045">anemic</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.2935" x="605.5234" y="355.1045">&#8212; every guard lives in the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.5659" x="428.5" y="371.4561">Application-layer command handler, never on the entity.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.3989" x="428.5" y="387.8076">Illegal transitions return</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="135.8081" x="566.5107" y="387.8076">409 ConflictException</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="702.3188" y="387.8076">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.3062" x="432.1118" y="404.1592">- Submit  requires Outstanding</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="13" x="612.0298" y="404.1592">or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="51.3081" x="628.6416" y="404.1592">Rejected</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.3462" x="432.1118" y="420.5107">- Confirm requires Pending</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.2998" x="432.1118" y="436.8623">- Reject  requires Pending</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6377" x="428.5" y="453.2139">Each successful transition publishes an integration event</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="416.1841" x="428.5" y="469.5654">(payment.created / submitted / confirmed / rejected) &#8212; see events.puml.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="32" id="ent0017"><path d="M6,716.6094 L6,792.0156 A0,0 0 0 0 6,792.0156 L457.6567,792.0156 A0,0 0 0 0 457.6567,792.0156 L457.6567,726.6094 L447.6567,716.6094 L236,716.6094 L232,638.7294 L228,716.6094 L6,716.6094 A0,0 0 0 0 6,716.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M447.6567,716.6094 L447.6567,726.6094 L457.6567,726.6094 L447.6567,716.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="153.8799" x="12" y="735.1045">Rejected is NOT terminal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.5083" x="169.4917" y="735.1045">(rejection "Model 1"): the tenant can</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.4561" x="12" y="751.4561">resubmit, looping back to Pending.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="65" x="215.0679" y="751.4561">Confirmed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="108.3799" x="283.6797" y="751.4561">is the only terminal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="430.6567" x="12" y="767.8076">business state. (Model 2 &#8212; Rejected becomes terminal with a superseding</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.8569" x="12" y="784.1592">Outstanding row &#8212; is a documented follow-up.)</text></g><!--link *start* to Outstanding--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="10" id="lnk3"><path d="M352,64.6194 C352,86.4794 352,137.9194 352,170.4794" fill="none" id="*start*-to-Outstanding" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="352,175.4794,356,166.4794,352,170.4794,348,166.4794,352,175.4794" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.8462" x="370.3481" y="109.1045">CreatePaymentHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.5425" x="353" y="125.4561">(landlord &#8212; RequireLandlord;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.3062" x="356.6182" y="141.8076">rent due, no submission yet)</text></g><!--link Outstanding to Pending--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="12" id="lnk5"><path d="M352,225.8694 C352,265.2294 352,337.5394 352,376.8794" fill="none" id="Outstanding-to-Pending" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="352,381.8794,356,372.8794,352,376.8794,348,372.8794,352,381.8794" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.2871" x="384.0781" y="270.1045">SubmitPaymentHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.3062" x="377.5686" y="286.4561">(tenant &#8212; RequireTenant;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.4434" x="353" y="302.8076">ReceiptUpload or ManualRequest)</text></g><!--link Rejected to Pending--><g class="link" data-entity-1="ent0006" data-entity-2="ent0004" data-link-type="dependency" data-source-line="13" id="lnk7"><path d="M269.64,595.2194 C285.15,586.2994 302.03,574.0394 313,558.6094 C340.38,520.1194 348.1678,468.9047 350.5978,437.2047" fill="none" id="Rejected-to-Pending" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="350.98,432.2194,346.3038,440.8873,350.5978,437.2047,354.2804,441.4988,350.98,432.2194" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.2871" x="379.3708" y="522.1045">SubmitPaymentHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="104.0444" x="395.9922" y="538.4561">(tenant resubmits;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.0288" x="338" y="554.8076">clears RejectedAt + RejectionReason)</text></g><!--link Pending to Rejected--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="16" id="lnk10"><path d="M316.2,411.1794 C261.89,417.9794 160.21,439.5994 115,507.6094 C102.45,526.4894 102.78,539.5194 115,558.6094 C132.36,585.7494 162.3592,598.2271 189.5292,605.0171" fill="none" id="Pending-to-Rejected" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="194.38,606.2294,186.6183,600.1667,189.5292,605.0171,184.6787,607.928,194.38,606.2294" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.6753" x="143.46" y="530.6045">RejectPaymentHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188.5952" x="116" y="546.9561">(landlord; sets RejectionReason)</text></g><!--link Pending to Confirmed--><g class="link" data-entity-1="ent0004" data-entity-2="ent0008" data-link-type="dependency" data-source-line="15" id="lnk9"><path d="M364.23,432.1394 C373.36,447.5794 387.29,466.7194 405,477.6094 C467.38,515.9594 509.45,462.3394 567,507.6094 C592.27,527.4894 603.2496,559.012 608.7296,583.302" fill="none" id="Pending-to-Confirmed" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="609.83,588.1794,611.7512,578.5197,608.7296,583.302,603.9474,580.2803,609.83,588.1794" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.3335" x="615.4631" y="530.6045">ConfirmPaymentHandler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.2598" x="601" y="546.9561">(landlord &#8212; RequireLandlord)</text></g><!--link Confirmed to *end*--><g class="link" data-entity-1="ent0008" data-entity-2="ent0011" data-link-type="dependency" data-source-line="18" id="lnk12"><path d="M614,638.7294 C614,669.4294 614,716.0594 614,737.8794" fill="none" id="Confirmed-to-*end*" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="614,742.8794,618,733.8794,614,737.8794,610,733.8794,614,742.8794" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46.2363" x="615" y="683.1045">terminal</text></g><?plantuml-src bLJ1RXCn4BtlLupA9LcQBKKKGIeXbQe894ghj9me1wztaZNrseizRhj2I7m4NyYNCDxr9gaeXoQAv8mzxysyUJOfqWZdeclG46YrHDb9ZlpvzHiykXjqCpHBwoHMu4aGGYDahGp292LTS3JuQPRvQsLQuKG3RuMyNZaRJ7LijNNmvDrH_6wT6A1-PF30sVuJTwohqANe_lxBLsN5qIFdx6qA7XmSP3-px4l-5MQpDt0MY75DfSmAvd3ia3bIaUyvhD5TcOcEAqRkErpWzw0SVaonmolZeWnLm5qm5dme6-MziWOw96vnco4odkF8TX6FqZziX4Omu1RNPHzXfWLAL2rzRhKL5N0xfy84eUCnz4osm6yeYML_3973lcRoJC1Z5Cx3Y7D4y3JzuOOMABmrtDA875cEhLagrp3dV5m_Ih_fFRHr0_Eq_2_M8LkD_0F5RGgAW77ESo1qZJ92Pvcnx26dLZM1NOuIiKKkwusZ-QUe0-KXpuN1Hiayxqj7jdO7go2u5Qrkq8CoG3L6YxMjLbB4IcPQTEX0sgRXMg4UIcTpn7ImVKRYA3ZpWzQu4Xh82UDL1F0y4WhECFsBPwzxLHcRJkuajd4_p-US1xCqL-3ZlQJ-dflpt3gkUrHqo4ZYR38s2l3kS1OUsZtX6ypUbXAzNuRjQg4DfLQ-vkF2i224AzVh4EKonBcJTX2saFtrgc1lk2KqhELwO7lCF5GxJOy93Y2-Q4EZYupBWJZ1DCVI4jac3dAhopnVcuWd-EdiSZrzLcFYHh_0pgcjKCF-pdJUJoJT1YbC1kixiGl