apiVersion: v2
name: myproperty
description: MyProperty SaaS platform — backend API, frontend, Keycloak, data tier, monitoring
type: application
version: 0.1.0
# appVersion is the SHA tag of the images deployed by this chart.
# CD workflow sets all image tags via --set at deploy time.
appVersion: "latest"

dependencies:
  - name: kube-prometheus-stack
    version: "65.2.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
