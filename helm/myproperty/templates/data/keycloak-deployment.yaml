{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "myproperty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        {{- include "myproperty.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      serviceAccountName: {{ .Release.Name }}-keycloak
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: realm-render
          image: {{ .Values.keycloak.initImage.repository }}:{{ .Values.keycloak.initImage.tag }}
          command:
            - sh
            - -c
            - apk add --no-cache gettext > /dev/null && envsubst '${MYPROPERTY_FRONTEND_BASE_URL} ${GOOGLE_CLIENT_ID} ${GOOGLE_CLIENT_SECRET}' < /template/realm-export.template.json > /import/realm-export.json
          env:
            - name: MYPROPERTY_FRONTEND_BASE_URL
              value: "https://{{ .Values.hosts.app }}"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: myproperty-google-oauth
                  key: client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myproperty-google-oauth
                  key: client-secret
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: realm-template
              mountPath: /template
            - name: realm-import
              mountPath: /import
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}
          args: ["start", "--import-realm"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
          env:
            - name: KC_HOSTNAME
              value: "https://{{ .Values.hosts.auth }}"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: myproperty-postgres
                  key: postgres-host
            - name: KC_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: myproperty-postgres
                  key: postgres-port
            - name: KC_DB_URL
              value: "jdbc:postgresql://$(KC_DB_HOST):$(KC_DB_PORT)/keycloak"
            - name: KC_DB_USERNAME
              value: "keycloak"
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myproperty-postgres
                  key: keycloak-db-password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: myproperty-keycloak-admin
                  key: admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myproperty-keycloak-admin
                  key: admin-password
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: myproperty-google-oauth
                  key: client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myproperty-google-oauth
                  key: client-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.keycloak.resources.requests.cpu }}
              memory: {{ .Values.keycloak.resources.requests.memory }}
            limits:
              cpu: {{ .Values.keycloak.resources.limits.cpu }}
              memory: {{ .Values.keycloak.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-template
          configMap:
            name: {{ .Release.Name }}-keycloak-realm
        - name: realm-import
          emptyDir: {}
{{- end }}
