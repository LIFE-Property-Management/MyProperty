{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    {{ include "myproperty.certIssuerAnnotation" . }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # SignalR WebSocket connections require long-lived connections — match M4.9 nginx proxy_read_timeout
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
{{- include "myproperty.tlsHosts" . | nindent 8 }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
{{- end }}
