{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    {{ include "myproperty.certIssuerAnnotation" . }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Keycloak admin console asset bundle requires larger proxy buffers — match M4.9 nginx proxy_buffer_size
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
{{- include "myproperty.tlsHosts" . | nindent 8 }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.hosts.auth }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  name: http
{{- end }}
