{{- if and .Values.ingress.enabled .Values.uptimeKuma.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-uptime-kuma
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: uptime-kuma
  annotations:
    {{ include "myproperty.certIssuerAnnotation" . }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Kuma's UI is socket.io-based — same long-lived WebSocket story as the
    # SignalR backend ingress. Without these timeouts the dashboard reconnects
    # every ~60s and looks like a Kuma bug. Match the M4.9 nginx api vhost.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
{{- include "myproperty.tlsHosts" . | nindent 8 }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.hosts.status }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma
                port:
                  name: http
{{- end }}
