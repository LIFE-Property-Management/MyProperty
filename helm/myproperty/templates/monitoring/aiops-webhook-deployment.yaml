{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-aiops-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: aiops-webhook
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aiops-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: aiops-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "myproperty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: aiops-webhook
  template:
    metadata:
      labels:
        {{- include "myproperty.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: aiops-webhook
    spec:
      serviceAccountName: {{ .Release.Name }}-aiops-webhook
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiops-webhook
          image: {{ .Values.aiopsWebhook.image.repository }}:{{ .Values.aiopsWebhook.image.tag }}
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: myproperty-anthropic
                  key: api-key
            - name: ANTHROPIC_MODEL
              value: "claude-haiku-4-5-20251001"
            # Discord incoming webhook — the service renders Discord-native embeds.
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: myproperty-discord
                  key: webhook-url
            - name: AIOPS_LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.aiopsWebhook.resources.requests.cpu }}
              memory: {{ .Values.aiopsWebhook.resources.requests.memory }}
            limits:
              cpu: {{ .Values.aiopsWebhook.resources.limits.cpu }}
              memory: {{ .Values.aiopsWebhook.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
{{- end }}
