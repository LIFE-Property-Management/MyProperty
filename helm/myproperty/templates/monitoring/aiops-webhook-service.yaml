apiVersion: v1
kind: Service
metadata:
  name: aiops-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: aiops-webhook
spec:
  type: ClusterIP
  selector:
    {{- include "myproperty.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: aiops-webhook
  ports:
    - name: http
      port: 5001
      targetPort: http
      protocol: TCP
