{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard-api-logs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  myproperty-api-logs.json: |
{{ .Files.Get "files/dashboard-api-logs.json" | replace "${DS_LOKI}" "loki" | indent 4 }}
{{- end }}
