{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-grafana-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.grafana.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.grafana.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  # Recreate, not RollingUpdate: Grafana mounts a single RWO longhorn PVC
  # ({{ .Release.Name }}-grafana-data). A rolling update would start the new pod before the old
  # one releases the volume → Multi-Attach error and a stuck rollout. Same
  # reasoning as the backend Deployment.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "myproperty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "myproperty.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      serviceAccountName: {{ .Release.Name }}-grafana
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: {{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: myproperty-grafana
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myproperty-grafana
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.hosts.grafana }}"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.grafana.resources.requests.cpu }}
              memory: {{ .Values.grafana.resources.requests.memory }}
            limits:
              memory: {{ .Values.grafana.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-api-metrics
              mountPath: /var/lib/grafana/dashboards/myproperty-api-metrics.json
              subPath: myproperty-api-metrics.json
            - name: dashboard-api-logs
              mountPath: /var/lib/grafana/dashboards/myproperty-api-logs.json
              subPath: myproperty-api-logs.json
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: {{ .Release.Name }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ .Release.Name }}-grafana-dashboard-provider
        - name: dashboard-api-metrics
          configMap:
            name: {{ .Release.Name }}-grafana-dashboard-api-metrics
        - name: dashboard-api-logs
          configMap:
            name: {{ .Release.Name }}-grafana-dashboard-api-logs
        - name: grafana-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-grafana-data
{{- end }}
