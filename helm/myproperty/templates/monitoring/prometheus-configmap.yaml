{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yaml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      - job_name: myproperty-api
        static_configs:
          - targets: ["backend:8080"]
        metrics_path: /metrics

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: loki
        static_configs:
          - targets: ["loki:3100"]
        metrics_path: /metrics
{{- if .Values.mailpit.metrics.enabled }}

      - job_name: mailpit
        static_configs:
          - targets: ["mailpit:{{ .Values.mailpit.metrics.port }}"]
        metrics_path: /metrics
{{- end }}

      - job_name: alertmanager
        static_configs:
          - targets: ["alertmanager:9093"]
{{- end }}
