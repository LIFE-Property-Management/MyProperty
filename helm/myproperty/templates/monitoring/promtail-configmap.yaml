{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-promtail-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ .Release.Namespace }}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - replacement: /var/log/pods/*$1/*.log
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
          - action: replace
            source_labels: [__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash]
            regex: "true"
            replacement: "true"
            target_label: __tmp_is_running
        pipeline_stages:
          # Only the .NET backend writes CLEF JSON to stdout. Other services (Keycloak,
          # Postgres, RabbitMQ, Redis, frontend) are plain text — they pass through with no
          # parsing and stay fully searchable, just without a parsed `level` label.
          - match:
              selector: '{component="backend"}'
              stages:
                - json:
                    expressions:
                      # CLEF keys are @-prefixed, so they must be quoted JMESPath literals.
                      # CompactJsonFormatter OMITS @l for Information (it's the default), so
                      # `level` is empty for info lines and is defaulted below.
                      level: '"@l"'
                      ts: '"@t"'
                # Default the omitted Information level so every backend line carries one.
                # The backtick wrapper makes Helm emit this Go template verbatim instead of
                # trying to evaluate `.Value` itself at chart-render time.
                - template:
                    source: level
                    template: '{{ `{{ if .Value }}{{ .Value }}{{ else }}Information{{ end }}` }}'
                # `level` is low-cardinality (a handful of values) → safe as a label.
                # CorrelationId / RequestId are deliberately NOT promoted (high cardinality
                # would bloat Loki's index); query them in the body with `| json` instead.
                - labels:
                    level:
                # Use the event's own timestamp, not ingest time.
                - timestamp:
                    source: ts
                    format: RFC3339Nano
{{- end }}
