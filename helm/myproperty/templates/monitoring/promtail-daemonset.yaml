{{- if .Values.monitoring.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-promtail
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
spec:
  selector:
    matchLabels:
      {{- include "myproperty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: promtail
  template:
    metadata:
      annotations:
        # Roll Promtail pods when the scrape/pipeline config changes so the new config
        # takes effect deterministically (rather than relying on watchConfig + the lag
        # of ConfigMap-to-file propagation).
        checksum/config: {{ include (print $.Template.BasePath "/monitoring/promtail-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "myproperty.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: promtail
    spec:
      serviceAccountName: {{ .Release.Name }}-promtail
      # runAsUser: 0 — Promtail must read root-owned kubelet log files.
      # Known exemption; M4.8 follow-up to investigate tightening.
      securityContext:
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: promtail
          image: {{ .Values.promtail.image.repository }}:{{ .Values.promtail.image.tag }}
          args: ["-config.file=/etc/promtail/config.yml"]
          # The promtail-config relabel sets each target's __host__ to its pod's NODE name,
          # and Promtail keeps a target only when __host__ equals its own hostname — which it
          # reads from $HOSTNAME first, falling back to os.Hostname() (the POD name). Without
          # this override, node-name != pod-name, so EVERY target is silently dropped and
          # nothing is ingested. Setting HOSTNAME to spec.nodeName makes the two sides match.
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.promtail.resources.requests.cpu }}
              memory: {{ .Values.promtail.resources.requests.memory }}
            limits:
              memory: {{ .Values.promtail.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: containers-logs
              mountPath: /var/log/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: promtail-config
          configMap:
            name: {{ .Release.Name }}-promtail-config
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: containers-logs
          hostPath:
            path: /var/log/containers
        - name: positions
          emptyDir: {}
{{- end }}
