{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-promtail
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
# automountServiceAccountToken intentionally true — Promtail needs the token
# for kubernetes_sd_configs Pod discovery via the K8s API.
automountServiceAccountToken: true
{{- end }}
