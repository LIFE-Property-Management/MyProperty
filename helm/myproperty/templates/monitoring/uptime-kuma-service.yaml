{{- if .Values.uptimeKuma.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: uptime-kuma
spec:
  type: ClusterIP
  selector:
    {{- include "myproperty.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: uptime-kuma
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
{{- end }}
