{{- if .Values.externalSecrets.enabled }}
{{- $storeName := "" }}
{{- if eq .Values.externalSecrets.provider "gcp" }}
{{- $storeName = printf "%s-gcp-secret-manager" .Release.Name }}
{{- end }}
{{- if eq .Values.externalSecrets.provider "azure" }}
{{- $storeName = printf "%s-azure-key-vault" .Release.Name }}
{{- end }}
{{- if not $storeName }}
{{- fail (printf "externalSecrets.provider must be \"gcp\" or \"azure\", got: %s" .Values.externalSecrets.provider) }}
{{- end }}
{{- $refs := .Values.externalSecrets.secretRefs }}
{{- $refresh := .Values.externalSecrets.refreshInterval }}
# ─────────────────────────────────────────────────────────────────────────
# ExternalSecret resources (M4.8).
#
# One ExternalSecret per Kubernetes Secret referenced by the workload
# templates. ESO controller reconciles the remote backend → Secret on the
# refreshInterval cadence. Workloads consume the rendered Secret via
# `valueFrom.secretKeyRef` unchanged from the manual-bootstrap path.
#
# The remote key name comes from `.Values.externalSecrets.secretRefs`,
# overridable per environment. The target Secret name and key shape are
# fixed (workloads reference them by literal name).
# ─────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myproperty-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: SecretStore
  target:
    name: myproperty-postgres
    creationPolicy: Owner
  data:
    - secretKey: postgres-user
      remoteRef:
        key: {{ $refs.postgresUser }}
    - secretKey: postgres-password
      remoteRef:
        key: {{ $refs.postgresPassword }}
    - secretKey: postgres-db
      remoteRef:
        key: {{ $refs.postgresDb }}
---
