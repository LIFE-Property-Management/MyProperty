{{- if .Values.externalSecrets.enabled }}
{{- if eq .Values.externalSecrets.provider "gcp" }}
# ─────────────────────────────────────────────────────────────────────────
# SecretStore — GCP Secret Manager backend (M4.8).
#
# Authentication uses a Kubernetes Secret holding a GCP service account
# JSON. Bootstrap the secret manually before `helm upgrade --install`:
#
#   kubectl -n {{ .Release.Namespace }} create secret generic \
#     {{ .Values.externalSecrets.gcp.credentialsSecretName }} \
#     --from-file={{ .Values.externalSecrets.gcp.credentialsSecretKey }}=/path/to/sa.json
#
# The service account must have `roles/secretmanager.secretAccessor` on
# every secret the chart references (see externalSecrets.secretRefs in
# values.yaml).
#
# Workload Identity (no bootstrap secret) is the recommended production
# path on GKE; see docs/operations/security-hardening.md for the alternate
# auth block.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Release.Name }}-gcp-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-store
spec:
  provider:
    gcpsm:
      projectID: {{ required "externalSecrets.gcp.projectId is required when provider=gcp" .Values.externalSecrets.gcp.projectId | quote }}
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: {{ .Values.externalSecrets.gcp.credentialsSecretName }}
            key: {{ .Values.externalSecrets.gcp.credentialsSecretKey }}
{{- end }}
{{- if eq .Values.externalSecrets.provider "azure" }}
# ─────────────────────────────────────────────────────────────────────────
# SecretStore — Azure Key Vault backend (M4.8).
#
# Authentication uses a Kubernetes Secret holding service-principal
# credentials. Bootstrap once:
#
#   kubectl -n {{ .Release.Namespace }} create secret generic \
#     {{ .Values.externalSecrets.azure.authSecretName }} \
#     --from-literal=client-id=<sp-client-id> \
#     --from-literal=client-secret=<sp-client-secret>
#
# The service principal needs `Key Vault Secrets User` role on the vault.
# Workload-identity is the recommended path on AKS — see operations doc.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Release.Name }}-azure-key-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myproperty.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-store
spec:
  provider:
    azurekv:
      tenantId: {{ required "externalSecrets.azure.tenantId is required when provider=azure" .Values.externalSecrets.azure.tenantId | quote }}
      vaultUrl: {{ required "externalSecrets.azure.vaultUrl is required when provider=azure" .Values.externalSecrets.azure.vaultUrl | quote }}
      authType: ServicePrincipal
      authSecretRef:
        clientId:
          name: {{ .Values.externalSecrets.azure.authSecretName }}
          key: client-id
        clientSecret:
          name: {{ .Values.externalSecrets.azure.authSecretName }}
          key: client-secret
{{- end }}
{{- end }}
