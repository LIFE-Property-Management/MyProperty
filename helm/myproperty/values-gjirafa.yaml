# values-gjirafa.yaml — overlay for namespace project-02 on the shared Hetzner
# cluster. Deploy with:
#   helm upgrade --install myproperty ./helm/myproperty \
#     --kubeconfig project-02.kubeconfig -n project-02 -f helm/myproperty/values-gjirafa.yaml

hosts:
  app: app.myproperty.works
  api: api.myproperty.works
  auth: auth.myproperty.works
  grafana: grafana.myproperty.works

postgres:
  enabled: true
  storage:
    storageClassName: longhorn
  sslMode: Disable
redis:
  enabled: true
rabbitmq:
  enabled: true
  storage:
    storageClassName: longhorn
keycloak:
  enabled: true
backend:
  enabled: true
  image:
    tag: "4286926"
  storage:
    storageClassName: longhorn
migration:
  image:
    tag: "1232e70"
frontend:
  enabled: true
  image:
    tag: "8c93b63"

ingress:
  enabled: true
  tls:
    secretName: myproperty-tls
    issuerKind: Issuer
    issuerName: letsencrypt-prod
    createIssuers: true
    acmeEmail: erdi.syla@gjirafa.com
    issuers:
      - name: letsencrypt-staging
        server: https://acme-staging-v02.api.letsencrypt.org/directory
      - name: letsencrypt-prod
        server: https://acme-v02.api.letsencrypt.org/directory

monitoring:
  enabled: true
uptimeKuma:
  enabled: true
  storage:
    storageClassName: longhorn
  seedImage:
    tag: "19c92bd"

aiopsWebhook:
  image:
    tag: "8f4a2f3"

prometheus:
  storage:
    storageClassName: longhorn

alertmanager:
  storage:
    storageClassName: longhorn

grafana:
  storage:
    storageClassName: longhorn
  ingressAllowlist: ""

loki:
  storage:
    storageClassName: longhorn
