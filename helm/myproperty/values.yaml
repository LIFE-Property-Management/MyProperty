# Default values for the myproperty Helm chart.
# Single environment — no value layering. Override at deploy time with --set or --values.

postgres:
  # When true (default), the chart renders an in-cluster Postgres StatefulSet,
  # Service, and init-configmap. When false, those templates are skipped and
  # the backend reads connection details (host, port) from the myproperty-postgres
  # Secret — populated by the bootstrap runbook from Terraform outputs. The
  # backend's connection string template is unchanged; only the Secret content
  # differs between modes.
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
  storage:
    size: 10Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

externalPostgres:
  # Only consumed when postgres.enabled is false. The host and port live in the
  # myproperty-postgres Secret alongside the other DB credentials — keeping all
  # connection details in a single Secret. These values exist in values.yaml
  # only as a documentation hint; the chart does NOT read them. The Secret is
  # the source of truth.
  # Example (do not set; create the Secret instead):
  #   host: private-myproperty-db-xxx-do-user-xxxxx.b.db.ondigitalocean.com
  #   port: 25060
  enabled: false

redis:
  image:
    repository: redis
    tag: 7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

rabbitmq:
  image:
    repository: rabbitmq
    tag: 3-management
  storage:
    size: 5Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.2"
  initImage:
    repository: alpine
    tag: "3.20"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

backend:
  image:
    repository: ghcr.io/life-property-management/myproperty-api
    # Set at deploy time via --set backend.image.tag=<SHA>
    tag: latest
  # replicas: 1 — ReadWriteOnce PVC limits to single pod.
  # M5 follow-up: migrate file storage to DO Spaces to remove this constraint.
  replicas: 1
  storage:
    size: 5Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

migration:
  image:
    repository: ghcr.io/life-property-management/myproperty-migrations
    # Set at deploy time via --set migration.image.tag=<SHA>
    tag: latest

frontend:
  image:
    repository: ghcr.io/life-property-management/myproperty-frontend
    # Set at deploy time via --set frontend.image.tag=<SHA>
    # Note: bundle has placeholder URLs until Phase 9 updates frontend-ci.yml.
    tag: latest
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

aiopsWebhook:
  image:
    repository: ghcr.io/life-property-management/myproperty-aiops-webhook
    # Set at deploy time via --set aiopsWebhook.image.tag=<SHA>
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

uptimeKuma:
  image:
    repository: louislam/uptime-kuma
    tag: 1.23.16-alpine
  seedImage:
    repository: ghcr.io/life-property-management/myproperty-uptime-kuma-init
    # Set at deploy time via --set uptimeKuma.seedImage.tag=<SHA>
    tag: latest
  # Public hostname the status page lives at. Added to every Ingress's TLS
  # host list so the SAN cert covers it. M4.4 single-environment pattern —
  # parameterise per-env in M5 if multiple environments ever exist.
  publicHost: status.myproperty.works
  # Footer text on the status page links here. Set at install time via
  # --set uptimeKuma.publicUrl=https://status.myproperty.works.
  publicUrl: https://status.myproperty.works
  storage:
    size: 2Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi
  # Email notification target — defaults are dev-only placeholders. Override
  # to a real SMTP relay (SendGrid/Mailgun/SES) at deploy time.
  smtp:
    host: ""    # empty disables the email channel entirely
    port: 587
    from: uptime@myproperty.works
    to: oncall@myproperty.works

loki:
  image:
    repository: grafana/loki
    tag: "3.2.0"
  storage:
    size: 10Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

promtail:
  image:
    repository: grafana/promtail
    tag: "3.2.0"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: do-block-storage
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 20Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi

  alertmanager:
    config:
      route:
        receiver: 'aiops-webhook'
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers:
              - severity = critical
            receiver: 'aiops-webhook'
      receivers:
        - name: 'aiops-webhook'
          webhook_configs:
            - url: 'http://aiops-webhook.myproperty.svc.cluster.local:5001/alerts'
              send_resolved: true
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity = warning
          equal: ['alertname', 'service']
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: do-block-storage
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 1Gi

  grafana:
    admin:
      existingSecret: myproperty-grafana
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      storageClassName: do-block-storage
      size: 2Gi
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
      dashboards:
        enabled: true
        label: grafana_dashboard

  defaultRules:
    create: true
    rules:
      node: false

# ─────────────────────────────────────────────────────────────────────────
# External Secrets Operator (M4.8 — Key Vault / Secret Manager).
#
# When `enabled: true`, this chart ships a SecretStore + one ExternalSecret
# per application secret. ESO syncs values from the chosen cloud backend
# into Kubernetes Secrets that the existing workload templates reference
# unchanged.
#
# When `enabled: false` (default), no ESO resources are rendered. Operators
# bootstrap Secrets via the `kubectl create secret` runbook in
# docs/operations/k8s-deployment.md. This keeps the chart deployable on
# clusters where ESO is not installed.
#
# Prerequisite: ESO controller installed cluster-wide (one-time, separate
# from this release):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# Backend selection: set `provider` to "gcp" or "azure"; only the matching
# SecretStore is rendered. Pre-populate the cloud backend with the remote
# secret names listed under `secretRefs` below.
# ─────────────────────────────────────────────────────────────────────────
externalSecrets:
  enabled: false
  provider: gcp           # "gcp" | "azure"
  refreshInterval: 1h     # SecretStore polling cadence

  gcp:
    # GCP project ID hosting the Secret Manager secrets.
    projectId: ""
    # Pre-bootstrapped Kubernetes Secret containing the GCP service-account
    # JSON for a SA with roles/secretmanager.secretAccessor.
    #
    # Bootstrap (one time, before `helm upgrade --install`):
    #   kubectl -n myproperty create secret generic gcp-secret-manager-credentials \
    #     --from-file=credentials.json=/path/to/sa.json
    credentialsSecretName: gcp-secret-manager-credentials
    credentialsSecretKey: credentials.json

  azure:
    # Azure Key Vault URL, e.g. https://myproperty-kv.vault.azure.net.
    vaultUrl: ""
    tenantId: ""
    # Service principal credentials in a Kubernetes Secret with keys
    # `client-id` and `client-secret`. Workload-identity is the better
    # production path; SP creds documented here for school-demo simplicity.
    authSecretName: azure-key-vault-credentials

  # Mapping from in-cluster Secret key names to remote secret resource names.
  # Override per environment via --set or values overlay. The Kubernetes
  # Secret name and key shape are fixed (the workload templates reference
  # them by name); only the remote side is configurable.
  secretRefs:
    postgresUser: myproperty-postgres-user
    postgresPassword: myproperty-postgres-password
    postgresDb: myproperty-postgres-db
    rabbitmqUser: myproperty-rabbitmq-user
    rabbitmqPassword: myproperty-rabbitmq-password
    keycloakAdminUser: myproperty-keycloak-admin-user
    keycloakAdminPassword: myproperty-keycloak-admin-password
    googleOauthClientId: myproperty-google-oauth-client-id
    googleOauthClientSecret: myproperty-google-oauth-client-secret
    anthropicApiKey: myproperty-anthropic-api-key
    discordWebhookUrl: myproperty-discord-webhook-url
    grafanaAdminUser: myproperty-grafana-admin-user
    grafanaAdminPassword: myproperty-grafana-admin-password

# ─────────────────────────────────────────────────────────────────────────
# NetworkPolicies (M4.8 — security hardening).
#
# When `enabled: true`, the chart ships a default-deny baseline plus
# targeted allow rules for the full service mesh. Requires a CNI that
# enforces NetworkPolicy (DOKS ships Cilium by default; check before
# enabling on other distributions).
# ─────────────────────────────────────────────────────────────────────────
networkPolicies:
  enabled: false
  # Ingress controller namespace — pods carrying the
  # `app.kubernetes.io/name: ingress-nginx` label inside this namespace are
  # permitted to reach the public-facing workloads (frontend, backend,
  # keycloak). Override if running a different controller / namespace.
  ingressNamespace: ingress-nginx
  # kube-prometheus-stack lives in the same release namespace by default
  # because it ships as a chart dependency. If the chart is split out,
  # override with the controller's namespace.
  monitoringNamespace: myproperty
