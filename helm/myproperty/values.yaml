# Default values for the myproperty Helm chart.
# Single environment — no value layering. Override at deploy time with --set or --values.

postgres:
  # When true (default), the chart renders an in-cluster Postgres StatefulSet,
  # Service, and init-configmap. When false, those templates are skipped and
  # the backend reads connection details (host, port) from the myproperty-postgres
  # Secret — populated by the bootstrap runbook from Terraform outputs. The
  # backend's connection string template is unchanged; only the Secret content
  # differs between modes.
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
  storage:
    size: 10Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

externalPostgres:
  # Only consumed when postgres.enabled is false. The host and port live in the
  # myproperty-postgres Secret alongside the other DB credentials — keeping all
  # connection details in a single Secret. These values exist in values.yaml
  # only as a documentation hint; the chart does NOT read them. The Secret is
  # the source of truth.
  # Example (do not set; create the Secret instead):
  #   host: private-myproperty-db-xxx-do-user-xxxxx.b.db.ondigitalocean.com
  #   port: 25060
  enabled: false

redis:
  image:
    repository: redis
    tag: 7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

rabbitmq:
  image:
    repository: rabbitmq
    tag: 3-management
  storage:
    size: 5Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.2"
  initImage:
    repository: alpine
    tag: "3.20"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

backend:
  image:
    repository: ghcr.io/life-property-management/myproperty-api
    # Set at deploy time via --set backend.image.tag=<SHA>
    tag: latest
  # replicas: 1 — ReadWriteOnce PVC limits to single pod.
  # M5 follow-up: migrate file storage to DO Spaces to remove this constraint.
  replicas: 1
  storage:
    size: 5Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

migration:
  image:
    repository: ghcr.io/life-property-management/myproperty-migrations
    # Set at deploy time via --set migration.image.tag=<SHA>
    tag: latest

frontend:
  image:
    repository: ghcr.io/life-property-management/myproperty-frontend
    # Set at deploy time via --set frontend.image.tag=<SHA>
    # Note: bundle has placeholder URLs until Phase 9 updates frontend-ci.yml.
    tag: latest
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

aiopsWebhook:
  image:
    repository: ghcr.io/life-property-management/myproperty-aiops-webhook
    # Set at deploy time via --set aiopsWebhook.image.tag=<SHA>
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

loki:
  image:
    repository: grafana/loki
    tag: "3.2.0"
  storage:
    size: 10Gi
    storageClassName: do-block-storage
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

promtail:
  image:
    repository: grafana/promtail
    tag: "3.2.0"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: do-block-storage
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 20Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi

  alertmanager:
    config:
      route:
        receiver: 'aiops-webhook'
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers:
              - severity = critical
            receiver: 'aiops-webhook'
      receivers:
        - name: 'aiops-webhook'
          webhook_configs:
            - url: 'http://aiops-webhook.myproperty.svc.cluster.local:5001/alerts'
              send_resolved: true
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity = warning
          equal: ['alertname', 'service']
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: do-block-storage
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 1Gi

  grafana:
    admin:
      existingSecret: myproperty-grafana
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      storageClassName: do-block-storage
      size: 2Gi
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
      dashboards:
        enabled: true
        label: grafana_dashboard

  defaultRules:
    create: true
    rules:
      node: false
