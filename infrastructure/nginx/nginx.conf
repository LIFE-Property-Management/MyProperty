# MyProperty nginx — top-level config.
#
# Renders per-host server blocks from /etc/nginx/templates/*.template
# (the official nginx image runs envsubst on those at container start;
# see infrastructure/nginx/templates/myproperty.conf.template).
#
# Lives in infrastructure/nginx/nginx.conf and is bind-mounted into the
# nginx service in docker-compose.yml. In Kubernetes the equivalent is a
# ConfigMap with the same content — see infrastructure/nginx/PRODUCTION.md.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide the nginx version from response headers + the default error page.
    # Trivy CIS-Docker section 5.x flags `server_tokens on` as an info leak;
    # turning it off is one of the cheapest hardening steps available.
    server_tokens off;

    # X-Forwarded-For arrives as a comma-separated list when upstream proxies
    # have prepended their entries (cluster ingress in K8s, CDN in front of
    # bare-metal). $proxy_add_x_forwarded_for handles that case correctly;
    # logging $http_x_forwarded_for instead would clobber existing entries.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" xff="$proxy_add_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # gzip pays for itself on the Next.js JS bundle + Keycloak JSON
    # responses. Bumped types beyond the nginx default; left the binary
    # content types out.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      application/wasm font/woff2 image/svg+xml;

    # Upload cap. Receipts are gated at 5 MB by FluentValidation and 6 MB by
    # Kestrel's RequestSizeLimit. Setting 10 MB at the proxy gives a small
    # buffer so a denied upload returns the app's 413/400 rather than nginx's
    # generic "request entity too large" page.
    client_max_body_size 10m;

    # WebSocket upgrade map. Used by the SignalR hub at
    # https://api.${DOMAIN}/hubs/notifications. The proxy must forward
    # `Connection: Upgrade` + `Upgrade: websocket` to the backend, but
    # only when those headers were actually sent. The map sets $connection_upgrade
    # to "upgrade" for WebSocket requests and "" (let nginx default to
    # keep-alive) for everything else.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Modern TLS profile (Mozilla intermediate, 2025 reference). Drop
    # TLS 1.0/1.1; both have been deprecated by every major browser since
    # 2020 and IETF RFC 8996. ECDHE-only ciphers; server preference disabled
    # because the modern cipher suites are all considered safe regardless
    # of order.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # OCSP stapling. resolver lines pick up Docker's embedded DNS (127.0.0.11)
    # in compose; in K8s the cluster DNS service answers the same way.
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   127.0.0.11 valid=300s ipv6=off;
    resolver_timeout           5s;

    include /etc/nginx/conf.d/*.conf;
}
