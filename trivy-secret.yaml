# Trivy secret-scan config. Loaded by the *-ci.yml Trivy SARIF steps via the
# TRIVY_SECRET_CONFIG env var (Trivy also auto-loads a file with this exact
# name from its working directory).
#
# allow-rules silence known false positives ONLY — secret scanning stays fully
# active everywhere else. Triage workflow mirrors .trivyignore: add an entry
# with a rationale, scope it as tightly as possible (prefer `path`).
allow-rules:
  - id: uptime-kuma-api-sample-jwt
    description: >-
      Sample/documentation JWTs shipped inside the vendored uptime_kuma_api
      Python library baked into the uptime-kuma-init image. Not our secrets.
    path: .*/site-packages/uptime_kuma_api/.*
